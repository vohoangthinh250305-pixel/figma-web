<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Store</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="container nav">
        <div class="logo">SHOE STORE</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Sale</a>
            <a href="#">Contact</a>
        </div>
    </div>
</header>

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <h1>NEW SNEAKERS 2026</h1>
        <p>SALE UP TO 50%</p>
        <button>SHOP NOW</button>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">
    <h2>POPULAR SHOES</h2>

    <div class="product-list">

        <div class="product">
            <img src="images/shoe1.jpg">
            <h3>Nike Air Max</h3>
            <p>1.500.000đ</p>
        </div>

        <div class="product">
            <img src="images/shoe2.jpg">
            <h3>Adidas Runner</h3>
            <p>1.700.000đ</p>
        </div>

        <div class="product">
            <img src="images/shoe3.jpg">
            <h3>Nike White</h3>
            <p>1.400.000đ</p>
        </div>

        <div class="product">
            <img src="images/shoe4.jpg">
            <h3>Nike Green</h3>
            <p>1.600.000đ</p>
        </div>

    </div>
</section>

</body>
</html>
